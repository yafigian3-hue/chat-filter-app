<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Chat Filter System</title>
  </head>

  <body
    class="bg-gray-100 min-h-screen p-2 sm:p-4 flex items-center justify-center"
  >
    <div
      class="w-full max-w-2xl bg-white rounded-2xl shadow-lg flex flex-col h-[95vh] sm:h-[700px] overflow-hidden"
    >
      <div class="p-4 border-b flex items-center justify-between">
        <h1 class="font-semibold text-sm sm:text-base">Chat Filter App</h1>

        <span class="text-xs text-gray-500"> Online </span>
      </div>

      <!-- CHAT AREA -->
      <div
        id="chatBox"
        class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-3 bg-gray-50"
      ></div>

      <!-- TOOLBAR -->
      <div
        class="flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between px-4 py-3 border-t bg-white"
      >
        <!-- STATUS -->
        <div id="statusBox" class="text-xs text-gray-500 font-medium">
          ✔️ Ready
        </div>

        <!-- SELECT USER -->
        <div class="relative w-full sm:w-auto">
          <select
            id="userSelect"
            class="appearance-none w-full sm:w-40 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-xl px-4 py-2 pr-10 shadow-sm outline-none transition-all duration-200 focus:ring-2 focus:ring-blue-400"
          >
            <option value="You">👤 You</option>
            <option value="Admin">🛡️ Admin</option>
            <option value="Bot">🤖 Bot</option>
          </select>

          <div
            class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500 text-xs"
          >
            ▼
          </div>
        </div>
      </div>

      <!-- INPUT -->
      <div class="p-3 border-t bg-white flex items-center gap-2">
        <textarea
          id="ketik"
          rows="1"
          placeholder="Ketik pesan..."
          class="w-full flex-1 px-4 py-3 bg-gray-100 rounded-xl text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
        ></textarea>
        <button
          id="clearBtn"
          class="px-4 py-3 bg-red-500 hover:bg-red-600 transition text-white rounded-xl text-sm font-medium"
        >
          Hapus
        </button>
        <button
          id="sendBtn"
          class="px-4 py-3 bg-blue-500 hover:bg-blue-600 transition text-white rounded-xl text-sm font-medium"
        >
          Kirim
        </button>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div
      id="editModal"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center p-4 z-50"
    >
      <div class="bg-white w-full max-w-md rounded-2xl p-5 shadow-xl">
        <h2 class="text-lg font-semibold mb-4">Edit Pesan</h2>

        <input
          id="editInput"
          type="text"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
        />

        <div class="flex justify-end gap-2 mt-4">
          <button
            id="cancelEditBtn"
            class="px-4 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition"
          >
            Batal
          </button>

          <button
            id="saveEditBtn"
            class="px-4 py-2 rounded-xl bg-blue-500 text-white hover:bg-blue-600 transition"
          >
            Simpan
          </button>
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/bot.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
