<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Chat Filter System</title>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-lg flex flex-col h-[500px]"
    >
      <!-- HEADER -->
      <div class="p-4 border-b font-semibold">Chat Filter App</div>

      <!-- CHAT AREA -->
      <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

      <!-- TOOLBAR -->
      <div
        class="flex items-center justify-between px-4 py-2 border-t bg-gray-50"
      >
        <!-- STATUS -->
        <div id="statusBox" class="text-xs text-gray-500 font-medium">
          ✔️ Ready
        </div>

        <!-- SELECT USER -->
        <div class="relative">
          <select
            id="userSelect"
            class="appearance-none bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-xl px-4 py-2 pr-10 shadow-sm outline-none transition-all duration-200 focus:ring-2 focus:ring-blue-400 focus:border-blue-400 hover:border-gray-400"
          >
            <option value="You">👤 You</option>
            <option value="Admin">🛡️ Admin</option>
            <option value="Bot">🤖 Bot</option>
          </select>

          <!-- icon -->
          <div
            class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500 text-xs"
          >
            ▼
          </div>
        </div>
      </div>

      <!-- INPUT -->
      <div class="p-3 border-t bg-white flex gap-2 items-center">
        <input
          id="ketik"
          type="text"
          placeholder="Ketik pesan..."
          class="flex-1 px-4 py-3 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <button id="clearBtn" class="px-4 py-3 bg-red-500 text-white rounded-lg">
          Hapus
        </button>
        <button id="sendBtn" class="px-4 py-3 bg-blue-500 text-white rounded-lg">
          Kirim
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
